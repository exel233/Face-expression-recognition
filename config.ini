# Configuration for Expression Detector

[app]
# Flask application settings
debug = False
host = 0.0.0.0
port = 5000
threaded = True

[camera]
# Camera settings
camera_index = 0  # 0 for default/built-in camera
frame_width = 640
frame_height = 480
frame_rate = 30

[detector]
# Detection settings
min_detection_confidence = 0.5
max_faces = 1

[stream]
# Video streaming settings
jpeg_quality = 85
frame_rate_limit = 100  # Maximum frames per second

[ui]
# UI update settings
stats_update_interval = 500  # milliseconds
